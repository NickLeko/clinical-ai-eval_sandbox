name: Clinical AI Eval (Published Benchmark Candidate)

on:
  workflow_dispatch:
    inputs:
      model:
        description: "Model id (OpenAI)"
        required: true
        default: "gpt-4o"
      prompt_version:
        description: "Prompt version label"
        required: true
        default: "v1"
      run_id:
        description: "Explicit benchmark-candidate run identifier"
        required: true
        default: "published_candidate"

permissions:
  contents: read

jobs:
  build-published-candidate:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      PYTHONPATH: "."

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Python sources
        run: python -m py_compile src/*.py tests/*.py

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Generate live benchmark candidate
        run: |
          python src/generate_answers.py \
            --dataset dataset/clinical_questions.csv \
            --provider openai \
            --model "${{ inputs.model }}" \
            --prompt-version "${{ inputs.prompt_version }}" \
            --run-id "${{ inputs.run_id }}" \
            --results-dir sandbox_results/published_candidate \
            --run-kind candidate

      - name: Replay benchmark candidate artifacts from cache
        run: |
          python src/generate_answers.py \
            --dataset dataset/clinical_questions.csv \
            --provider openai \
            --model "${{ inputs.model }}" \
            --prompt-version "${{ inputs.prompt_version }}" \
            --run-id "${{ inputs.run_id }}" \
            --results-dir sandbox_results/published_candidate \
            --run-kind candidate
          python src/run_evaluation.py --dataset dataset/clinical_questions.csv --results-dir sandbox_results/published_candidate
          python src/summarize_results.py --top-n 10 --results-dir sandbox_results/published_candidate

      - name: Snapshot candidate artifacts
        run: |
          mkdir -p /tmp/candidate_baseline
          cp sandbox_results/published_candidate/raw_generations.jsonl /tmp/candidate_baseline/raw_generations.jsonl
          cp sandbox_results/published_candidate/evaluation_output.csv /tmp/candidate_baseline/evaluation_output.csv
          cp sandbox_results/published_candidate/flagged_cases.jsonl /tmp/candidate_baseline/flagged_cases.jsonl
          cp sandbox_results/published_candidate/summary.md /tmp/candidate_baseline/summary.md
          cp sandbox_results/published_candidate/run_manifest.json /tmp/candidate_baseline/run_manifest.json

      - name: Rebuild candidate artifacts from cache
        run: |
          python src/generate_answers.py \
            --dataset dataset/clinical_questions.csv \
            --provider openai \
            --model "${{ inputs.model }}" \
            --prompt-version "${{ inputs.prompt_version }}" \
            --run-id "${{ inputs.run_id }}" \
            --results-dir sandbox_results/published_candidate \
            --run-kind candidate
          python src/run_evaluation.py --dataset dataset/clinical_questions.csv --results-dir sandbox_results/published_candidate
          python src/summarize_results.py --top-n 10 --results-dir sandbox_results/published_candidate

      - name: Assert candidate artifacts are reproducible
        run: |
          diff -u /tmp/candidate_baseline/raw_generations.jsonl sandbox_results/published_candidate/raw_generations.jsonl
          diff -u /tmp/candidate_baseline/evaluation_output.csv sandbox_results/published_candidate/evaluation_output.csv
          diff -u /tmp/candidate_baseline/flagged_cases.jsonl sandbox_results/published_candidate/flagged_cases.jsonl
          diff -u /tmp/candidate_baseline/summary.md sandbox_results/published_candidate/summary.md
          diff -u /tmp/candidate_baseline/run_manifest.json sandbox_results/published_candidate/run_manifest.json

      - name: Upload published benchmark candidate
        uses: actions/upload-artifact@v4
        with:
          name: published-benchmark-candidate-${{ inputs.run_id }}
          path: sandbox_results/published_candidate/
