name: Offline Verification

on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: "."

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Python sources
        run: python -m py_compile src/*.py tests/*.py

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Read published run manifest
        run: |
          python -c "import json, os, pathlib; manifest = json.loads(pathlib.Path('results/run_manifest.json').read_text(encoding='utf-8')); open(os.environ['GITHUB_ENV'], 'a', encoding='utf-8').write(f\"PUBLISHED_PROVIDER={manifest['provider']}\\nPUBLISHED_MODEL={manifest['model_id']}\\nPUBLISHED_RUN_ID={manifest['run_id']}\\nPUBLISHED_PROMPT_VERSION={manifest['prompt_version']}\\n\")"

      - name: Regenerate published artifacts from cache
        run: |
          python src/generate_answers.py \
            --dataset dataset/clinical_questions.csv \
            --provider "$PUBLISHED_PROVIDER" \
            --model "$PUBLISHED_MODEL" \
            --prompt-version "$PUBLISHED_PROMPT_VERSION" \
            --run-id "$PUBLISHED_RUN_ID" \
            --run-kind published \
            --confirm-published
          python src/run_evaluation.py --dataset dataset/clinical_questions.csv
          python src/summarize_results.py --top-n 10

      - name: Assert published artifacts are reproducible
        run: |
          git diff --exit-code -- \
            results/raw_generations.jsonl \
            results/evaluation_output.csv \
            results/flagged_cases.jsonl \
            results/summary.md \
            results/run_manifest.json

      - name: Build derived reviewer package smoke check
        run: |
          python src/build_reviewer_report.py \
            --results-dir results \
            --output-dir /tmp/clinical-ai-reviewer-package
