<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 460" role="img" aria-labelledby="title desc">
  <title id="title">Published clinical AI evaluation snapshot from March 5, 2026</title>
  <desc id="desc">Across 25 synthetic cases, 22 passed, 3 received warnings, and none failed. Mean faithfulness proxy was 0.866, citation validity was 1.000, and uncertainty alignment was 0.932.</desc>
  <rect width="1200" height="460" rx="24" fill="#f8fafc"/>
  <rect x="1" y="1" width="1198" height="458" rx="23" fill="none" stroke="#cbd5e1" stroke-width="2"/>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" fill="#0f172a">
    <text x="56" y="62" font-size="28" font-weight="700">Published evaluation snapshot</text>
    <text x="56" y="92" font-size="17" fill="#475569">March 5, 2026 · 25 structured synthetic clinical scenarios</text>

    <g transform="translate(56 126)">
      <rect width="336" height="92" rx="14" fill="#ecfdf5" stroke="#a7f3d0"/>
      <circle cx="34" cy="32" r="8" fill="#0f766e"/>
      <text x="54" y="38" font-size="18" font-weight="650" fill="#115e59">PASS</text>
      <text x="26" y="76" font-size="30" font-weight="750">22</text>
      <text x="72" y="75" font-size="16" fill="#475569">88% of cases</text>
    </g>

    <g transform="translate(432 126)">
      <rect width="336" height="92" rx="14" fill="#fffbeb" stroke="#fde68a"/>
      <circle cx="34" cy="32" r="8" fill="#d97706"/>
      <text x="54" y="38" font-size="18" font-weight="650" fill="#92400e">WARN</text>
      <text x="26" y="76" font-size="30" font-weight="750">3</text>
      <text x="52" y="75" font-size="16" fill="#475569">12% of cases</text>
    </g>

    <g transform="translate(808 126)">
      <rect width="336" height="92" rx="14" fill="#fef2f2" stroke="#fecaca"/>
      <circle cx="34" cy="32" r="8" fill="#dc2626"/>
      <text x="54" y="38" font-size="18" font-weight="650" fill="#991b1b">FAIL</text>
      <text x="26" y="76" font-size="30" font-weight="750">0</text>
      <text x="52" y="75" font-size="16" fill="#475569">0% of cases</text>
    </g>

    <text x="56" y="262" font-size="15" font-weight="650" fill="#334155">GRADE DISTRIBUTION</text>
    <defs>
      <clipPath id="gradeBar">
        <rect x="56" y="278" width="1088" height="22" rx="11"/>
      </clipPath>
    </defs>
    <g clip-path="url(#gradeBar)">
      <rect x="56" y="278" width="957.44" height="22" fill="#0f766e"/>
      <rect x="1013.44" y="278" width="130.56" height="22" fill="#d97706"/>
    </g>

    <line x1="56" y1="330" x2="1144" y2="330" stroke="#cbd5e1"/>

    <text x="56" y="362" font-size="15" font-weight="650" fill="#334155">MEAN HEURISTIC SIGNALS</text>
    <text x="56" y="402" font-size="18" fill="#475569">Faithfulness proxy</text>
    <text x="242" y="402" font-size="22" font-weight="700">0.866</text>
    <text x="408" y="402" font-size="18" fill="#475569">Citation validity</text>
    <text x="552" y="402" font-size="22" font-weight="700">1.000</text>
    <text x="720" y="402" font-size="18" fill="#475569">Uncertainty alignment</text>
    <text x="920" y="402" font-size="22" font-weight="700">0.932</text>
    <text x="56" y="436" font-size="14" fill="#64748b">Heuristic review signals — not evidence of clinical validation or deployment readiness.</text>
  </g>
</svg>
